name: 🪐 Rotation phase contribution
description: Submit a rotation phase measurement (usually auto-generated by the app).
title: "[phase] "
labels: ["data:phase", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for contributing phase data. **The easiest path is to let sc-agent generate this for you** — Settings → Privacy → Contribute phase data → review the JSON → click submit.

        If you're submitting manually (e.g., for a body the app hasn't covered, or as a cross-check), paste your JSON below.

        Schema reference: [`docs/phase-data.md`](https://github.com/zimm1/sc-agent-public/blob/main/docs/phase-data.md).

  - type: textarea
    id: payload
    attributes:
      label: Phase data JSON
      description: |
        Paste the JSON the app generated, or write your own per the schema.
      render: json
      value: |
        [
          {
            "system_code": "stanton",
            "body_code": "stanton1",
            "phase_at_epoch_deg": 19.42,
            "phase_uncertainty_deg": 0.31,
            "observation_count": 47,
            "calibration_method": "ocr-stationary",
            "epoch_utc": "2020-01-01T00:00:00Z",
            "app_version": "0.0.2-rc1",
            "submitted_day_utc": "2026-05-15"
          }
        ]
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes (optional)
      description: |
        Anything the maintainer should know? E.g., "this body wasn't in the 2020 baseline", "I noticed the existing value is way off", "I'm cross-checking against an in-game observation at <UTC time>".

  - type: checkboxes
    id: license
    attributes:
      label: License agreement
      options:
        - label: I agree to release these measurements under MIT, joining the rest of the dataset corpus.
          required: true
